name: BrainDrill
options:
  bundleIdPrefix: com.yifancao
  createIntermediateGroups: true
packages:
  OpenAI:
    url: https://github.com/MacPaw/OpenAI.git
    from: "0.3.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 26.0
    MARKETING_VERSION: 0.2.0
    CURRENT_PROJECT_VERSION: 1
targets:
  BrainDrill:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
      - path: Resources
        type: folder
      - path: AppIcon.icns
        buildPhase: resources
    dependencies:
      - package: OpenAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yifancao.BrainDrill
        PRODUCT_NAME: BrainDrill
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: BrainDrill
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.education
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_CFBundleIconFile: AppIcon
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: YES
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - BrainDrillTests
  BrainDrillTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/BrainDrillTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.yifancao.BrainDrillTests
    dependencies:
      - target: BrainDrill
